name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: make test

      - name: Run UBSan
        run: make sanitize

      - name: Run ASan
        run: make asan

      - name: Run benchmarks
        run: make clean && make bench

  cmake-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CMake configure
        run: cmake -S . -B build -DCMAKE_C_STANDARD=11

      - name: CMake build
        run: cmake --build build

      - name: CMake test
        run: ctest --test-dir build --output-on-failure

      - name: Verify test count matches Makefile
        run: |
          cmake_count=$(ctest --test-dir build -N 2>&1 | grep 'Total Tests' | awk '{print $NF}')
          make_count=$(awk '/^TEST_SRCS/,/^TEST_BINS/' Makefile | grep -c 'test_')
          echo "CMake tests: $cmake_count, Makefile tests: $make_count"
          if [ "$cmake_count" -ne "$make_count" ]; then
            echo "FAIL: CMake ($cmake_count) and Makefile ($make_count) test counts differ"
            exit 1
          fi
          echo "PASS: test counts match"

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build library and thread tests with TSan
        run: |
          make clean
          make build/test_threads \
               CFLAGS="-std=c11 -Wall -Wextra -O1 -g -fsanitize=thread -fno-omit-frame-pointer -Iinclude" \
               LDFLAGS="-fsanitize=thread -lpthread"

      - name: Run thread safety tests under TSan
        run: |
          ./build/test_threads
        env:
          TSAN_OPTIONS: "halt_on_error=1"

      # Sprint 21 Day 5: exercise the OMP-parallel Lanczos MGS
      # kernel under TSan.  Ubuntu's libomp ships libarcher, so
      # implicit OMP barriers are visible to TSan and the run is
      # free of the false-positive races seen on macOS Homebrew
      # libomp (no archer).  Local `make sanitize-thread` on
      # macOS runs the same tests against the serial path only.
      #
      # CC=clang here is load-bearing: gcc's `-fopenmp` links
      # libgomp, which has no TSan annotations and triggers
      # false-positive races on every implicit barrier (e.g.
      # in `sparse_matvec`'s `#pragma omp parallel for`).  Clang
      # links libomp/libarcher when libomp-dev is installed.
      - name: Install libomp for archer-instrumented OMP
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev clang

      - name: Build eigensolver tests with TSan + OpenMP
        run: |
          make clean
          make build/test_eigs build/test_eigs_thick_restart \
               CC=clang \
               CFLAGS="-std=c11 -Wall -Wextra -O1 -g -fsanitize=thread -fno-omit-frame-pointer -DSPARSE_OPENMP -fopenmp -Iinclude" \
               LDFLAGS="-fsanitize=thread -fopenmp -lm"

      - name: Run eigensolver tests under TSan + OpenMP
        run: |
          ./build/test_eigs
          ./build/test_eigs_thick_restart
        env:
          # Ubuntu's libomp is not built with LIBOMP_TSAN_SUPPORT
          # (archer), so TSan reports false races inside the OMP
          # runtime's own thread-pool / mutex internals. Suppress
          # those without hiding races in our own kernels.
          TSAN_OPTIONS: "halt_on_error=1 suppressions=tests/tsan_suppressions.txt"
          OMP_NUM_THREADS: "4"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check formatting
        run: make format-check

      - name: Run linters
        run: make lint

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov bc

      - name: Generate coverage report and check threshold
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/

      - name: Print coverage summary
        if: always()
        run: |
          lcov --summary coverage/coverage-src.info 2>&1 | tail -5
