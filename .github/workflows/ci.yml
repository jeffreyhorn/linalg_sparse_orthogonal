name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: make test

      - name: Run UBSan
        run: make sanitize

      - name: Run ASan
        run: make asan

      # Sprint 29 Day 13 (Item 8 close): build all benchmark binaries
      # (compile-coverage for slow benches) + run the `bench-fast`
      # subset (genuinely fast benches + `bench_reorder --skip-factor`)
      # to keep a runtime regression signal on PRs without the 6 h
      # timeout that full `make bench` triggered on PRs #28-32.  Full
      # `make bench` ships as a developer-side opt-in for deep
      # wall-time investigations.
      - name: Build benchmark binaries (compile-only, no execution)
        run: make clean && make bench-build

      - name: Run fast benchmark subset (bench-fast)
        run: make bench-fast

  cmake-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run reviewed CMake parity path (clean rebuild + ctest -N + ctest)
        run: make quality-review-cmake

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build library and thread tests with TSan
        run: |
          make clean
          make build/test_threads \
               CFLAGS="-std=c11 -Wall -Wextra -O1 -g -fsanitize=thread -fno-omit-frame-pointer -Iinclude" \
               LDFLAGS="-fsanitize=thread -lpthread"

      - name: Run thread safety tests under TSan
        run: |
          ./build/test_threads
        env:
          TSAN_OPTIONS: "halt_on_error=1"

      # Sprint 21 Day 5: exercise the OMP-parallel Lanczos MGS
      # kernel under TSan on Ubuntu.  Local `make sanitize-thread`
      # on macOS still runs the same tests against the serial path
      # only.
      #
      # CC=clang here is load-bearing: gcc's `-fopenmp` links
      # libgomp, whose interaction with TSan is even noisier for
      # our OpenMP tests (no annotations on implicit barriers ->
      # races reported on every post-barrier read).  Clang links
      # Ubuntu's libomp when libomp-dev is installed, but that
      # runtime is *not* built with Archer / LIBOMP_TSAN_SUPPORT,
      # so we still expect to suppress false-positive reports from
      # libomp's own barrier / thread-pool internals in the test
      # run below (see `tests/tsan_suppressions.txt`) rather than
      # claiming the OMP runtime is fully TSan-aware.
      - name: Install clang and libomp for TSan OpenMP tests
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev clang

      - name: Build eigensolver tests with TSan + OpenMP
        run: |
          make clean
          make build/test_eigs build/test_eigs_thick_restart \
               CC=clang \
               CFLAGS="-std=c11 -Wall -Wextra -O1 -g -fsanitize=thread -fno-omit-frame-pointer -DSPARSE_OPENMP -fopenmp -Iinclude" \
               LDFLAGS="-fsanitize=thread -fopenmp -lm"

      # LOBPCG is intentionally omitted from this TSan+OMP run.  The
      # Ubuntu CI clang-18 libomp tripped an internal assertion
      # (`kmp_dispatch.cpp(1617): vnew.p.ub * (UT)chunk <= trip` /
      # `OMP: Error #13: Assertion failure`) inside the static-chunked
      # dispatch path on LOBPCG's block-wise OMP-MGS — an LLVM libomp
      # bug, NOT a TSan race or a sparse_eigs.c regression
      # (test_eigs + test_eigs_thick_restart both pass with 215 + 269
      # assertions under the same TSan+OMP build).  The non-TSan
      # build-and-test job + macOS CI continue to cover LOBPCG; this
      # job's OMP-race surface is fully covered by the grow-m Lanczos
      # + Wu/Simon thick-restart paths which share `s21_mgs_reorth`
      # with LOBPCG's reorth.  Sprint 30+ revisits if the libomp bug
      # is patched upstream.
      - name: Run eigensolver tests under TSan + OpenMP
        run: |
          ./build/test_eigs
          ./build/test_eigs_thick_restart
        env:
          # See suppressions file for rationale; Ubuntu's libomp is
          # not Archer-instrumented, so libomp-internal mutex /
          # barrier ops trip TSan even though the OMP semantics are
          # correct.  These suppressions primarily filter OpenMP-
          # runtime false positives, but the broad `called_from_lib:`
          # entries also hide real races in OMP-executed code
          # whenever libomp / libgomp appears anywhere in the stack
          # (the unavoidable cost of TSan against an
          # un-archer-instrumented runtime).  To surface those races
          # reliably, build libomp with `LIBOMP_TSAN_SUPPORT=ON`
          # (archer) or temporarily comment out the
          # `called_from_lib:` lines in the suppressions file.
          TSAN_OPTIONS: "halt_on_error=1 suppressions=tests/tsan_suppressions.txt"
          OMP_NUM_THREADS: "4"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Run reviewed Makefile compile-quality path (format-check + lint)
        run: make quality-review-compile

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dead-code tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-18 llvm-18-dev libclang-18-dev ninja-build

      - name: Build and install xunused
        run: |
          git clone --depth=1 https://github.com/mgehre/xunused.git /tmp/xunused
          cmake -S /tmp/xunused -B /tmp/xunused/build -G Ninja \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-18 \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-18/lib/cmake/clang
          cmake --build /tmp/xunused/build --parallel
          cmake --install /tmp/xunused/build --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Sprint 34 Day 10-12: keep dead-code execution in one serial job
      # so the shared build/artifact paths stay truthful and non-flaky.
      - name: Generate dead-code report (report.md + report.tsv + raw evidence)
        run: make deadcode-report

      - name: Validate dead-code report completeness
        run: make deadcode-check

      - name: Upload dead-code artifacts on failure or success
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadcode-report
          path: |
            build/deadcode/report.md
            build/deadcode/report.tsv
            build/deadcode/coverage-notes.txt
            build/deadcode/cppcheck.txt
            build/deadcode/xunused.txt

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov bc

      - name: Generate coverage report and check threshold
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/

      - name: Print coverage summary
        if: always()
        run: |
          lcov --summary coverage/coverage-src.info 2>&1 | tail -5
