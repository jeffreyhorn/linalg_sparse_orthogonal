name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: make test

      - name: Run UBSan
        run: make sanitize

      - name: Run ASan
        run: make asan

      - name: Run benchmarks
        run: make clean && make bench

  cmake-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CMake configure
        run: cmake -S . -B build -DCMAKE_C_STANDARD=11

      - name: CMake build
        run: cmake --build build

      - name: CMake test
        run: ctest --test-dir build --output-on-failure

      - name: Verify test count matches Makefile
        run: |
          cmake_count=$(ctest --test-dir build -N 2>&1 | grep 'Total Tests' | awk '{print $NF}')
          make_count=$(grep -c '$(TESTDIR)/test_' Makefile)
          echo "CMake tests: $cmake_count, Makefile tests: $make_count"
          if [ "$cmake_count" -ne "$make_count" ]; then
            echo "FAIL: CMake ($cmake_count) and Makefile ($make_count) test counts differ"
            exit 1
          fi
          echo "PASS: test counts match"

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build library with TSan
        run: |
          make clean
          make CFLAGS="-std=c11 -Wall -Wextra -O1 -g -fsanitize=thread -fno-omit-frame-pointer -Iinclude" \
               LDFLAGS="-fsanitize=thread -lpthread"

      - name: Run thread safety tests under TSan
        run: |
          ./build/test_threads
        env:
          TSAN_OPTIONS: "halt_on_error=1"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check formatting
        run: make format-check

      - name: Run linters
        run: make lint

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov bc

      - name: Generate coverage report and check threshold
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/

      - name: Print coverage summary
        if: always()
        run: |
          lcov --summary coverage/coverage-src.info 2>&1 | tail -5
